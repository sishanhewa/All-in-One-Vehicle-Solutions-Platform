info:
  name: 5.3 Get My Bookings (filter by status) 🔒
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/inspection/bookings/my-bookings?status=Pending"
  headers:
    - name: Authorization
      value: Bearer {{user_token}}
  params:
    - name: status
      value: Pending
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
