info:
  name: 3.6 Get Own Company Profile 🔒
  type: http
  seq: 6

http:
  method: GET
  url: "{{base_url}}/api/inspection/companies/profile"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
