info:
  name: 2.2 Get All Listings (with filters)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/marketplace?make=Toyota&minPrice=500000&maxPrice=5000000&location=Colombo"
  params:
    - name: make
      value: Toyota
      type: query
    - name: minPrice
      value: "500000"
      type: query
    - name: maxPrice
      value: "5000000"
      type: query
    - name: location
      value: Colombo
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
