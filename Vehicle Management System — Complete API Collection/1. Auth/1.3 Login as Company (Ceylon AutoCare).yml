info:
  name: 1.3 Login as Company (Ceylon AutoCare)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "info@ceylonautocare.lk",
        "password": "ceylon123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        if (jsonData.token) {\r

        \  pm.collectionVariables.set('company_token', jsonData.token);\r

        \  pm.collectionVariables.set('company_id', jsonData._id);\r

        \  console.log('✅ company_token & company_id saved');\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
