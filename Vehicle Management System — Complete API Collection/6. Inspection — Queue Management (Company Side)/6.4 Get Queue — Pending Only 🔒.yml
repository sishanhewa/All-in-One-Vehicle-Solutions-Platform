info:
  name: 6.4 Get Queue — Pending Only 🔒
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/inspection/bookings/queue?status=Pending"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  params:
    - name: status
      value: Pending
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
