info:
  name: 6.8 Upload Report Images 🔒 Company
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/inspection/bookings/{{booking_id}}/images"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  body:
    type: multipart-form
    data:
      - name: reportImages
        type: file
        value: []
      - name: reportImages
        type: file
        value: []
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
