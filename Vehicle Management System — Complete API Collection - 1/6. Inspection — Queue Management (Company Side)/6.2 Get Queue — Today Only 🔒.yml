info:
  name: 6.2 Get Queue — Today Only 🔒
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/inspection/bookings/queue?date=today"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  params:
    - name: date
      value: today
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
