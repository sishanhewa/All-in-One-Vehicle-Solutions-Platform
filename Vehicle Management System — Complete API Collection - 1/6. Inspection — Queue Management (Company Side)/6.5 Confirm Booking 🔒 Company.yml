info:
  name: 6.5 Confirm Booking 🔒 Company
  type: http
  seq: 5

http:
  method: PUT
  url: "{{base_url}}/api/inspection/bookings/{{booking_id}}/confirm"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
