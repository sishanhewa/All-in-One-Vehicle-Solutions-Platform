info:
  name: 6.3 Get Queue — This Week 🔒
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/inspection/bookings/queue?date=week"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  params:
    - name: date
      value: week
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
