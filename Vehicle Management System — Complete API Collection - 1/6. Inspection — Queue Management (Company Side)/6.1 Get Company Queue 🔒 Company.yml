info:
  name: 6.1 Get Company Queue 🔒 Company
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/inspection/bookings/queue"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
