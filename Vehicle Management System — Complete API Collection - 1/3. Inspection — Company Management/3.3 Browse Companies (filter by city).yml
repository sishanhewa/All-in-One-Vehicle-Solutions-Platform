info:
  name: 3.3 Browse Companies (filter by city)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/inspection/companies?city=Colombo"
  params:
    - name: city
      value: Colombo
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
