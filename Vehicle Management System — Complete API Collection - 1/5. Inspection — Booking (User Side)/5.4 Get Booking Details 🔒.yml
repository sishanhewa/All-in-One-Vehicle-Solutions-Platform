http:
  method: GET
  url: "{{base_url}}/api/inspection/bookings/{{booking_id}}"
  headers:
    - name: Authorization
      value: Bearer {{user_token}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
