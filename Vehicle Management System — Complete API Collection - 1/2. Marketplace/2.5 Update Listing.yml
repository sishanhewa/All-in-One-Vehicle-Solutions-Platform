info:
  name: 2.5 Update Listing
  type: http
  seq: 5

http:
  method: PUT
  url: "{{base_url}}/api/marketplace/{{listing_id}}"
  headers:
    - name: Authorization
      value: Bearer {{user_token}}
  body:
    type: text
    data: |-
      {
        "price": 7900000,
        "description": "Price reduced! Single owner, excellent condition."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
