info:
  name: 2.4 Create Listing
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/marketplace"
  headers:
    - name: Authorization
      value: Bearer {{user_token}}
  body:
    type: multipart-form
    data:
      - name: title
        type: text
        value: 2023 Toyota Aqua for Sale
      - name: make
        type: text
        value: Toyota
      - name: model
        type: text
        value: Aqua
      - name: year
        type: text
        value: "2023"
      - name: price
        type: text
        value: "8500000"
      - name: mileage
        type: text
        value: "25000"
      - name: fuelType
        type: text
        value: Hybrid
      - name: transmission
        type: text
        value: Automatic
      - name: bodyType
        type: text
        value: Hatchback
      - name: location
        type: text
        value: Colombo
      - name: condition
        type: text
        value: Reconditioned
      - name: description
        type: text
        value: Single owner, mint condition. Low mileage.
      - name: images
        type: file
        value: []
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        if (jsonData._id) {\r

        \  bru.setVar('listing_id', jsonData._id);\r

        \  console.log('✅ listing_id saved');\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
