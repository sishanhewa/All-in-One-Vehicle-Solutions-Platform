info:
  name: Step 4 — Book Inspection
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/inspection/bookings"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{user_token}}
  body:
    type: json
    data: |-
      {
        "companyId": "{{company_id}}",
        "packageId": "{{package_id}}",
        "make": "Honda",
        "model": "Civic",
        "year": 2019,
        "plateNumber": "WP-KA-5678",
        "vehicleType": "Car",
        "appointmentDate": "2026-04-20",
        "appointmentTime": "11:00 AM",
        "notes": "Pre-purchase inspection — buying from a dealer"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        bru.setVar('booking_id', jsonData._id);\r

        console.log('✅ Booking created:', jsonData.status);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
