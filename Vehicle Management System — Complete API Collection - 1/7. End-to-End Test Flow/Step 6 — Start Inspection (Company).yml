info:
  name: Step 6 — Start Inspection (Company)
  type: http
  seq: 6

http:
  method: PUT
  url: "{{base_url}}/api/inspection/bookings/{{booking_id}}/start"
  headers:
    - name: Authorization
      value: Bearer {{company_token}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: console.log('✅ Status:', res.getBody().status);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
